rules:
  # Cooldown configured in dependabot.yml but zizmor 1.23.1 doesn't detect it yet
  dependabot-cooldown:
    ignore:
      - "**"
  # crates.io trusted publishing requires per-crate setup — using CARGO_REGISTRY_TOKEN for now
  use-trusted-publishing:
    ignore:
      - release.yml
  # dtolnay/rust-toolchain is the Rust ecosystem standard for CI toolchain management
  superfluous-actions:
    ignore:
      - allocs.yml
      - bench.yml
      - bloat.yml
      - ci.yml
      - conformance.yml
      - coverage.yml
      - cross-arch.yml
      - ecosystem-full.yml
      - ecosystem.yml
      - release.yml
  # Caching in release workflow is acceptable — tags are immutable
  cache-poisoning:
    ignore:
      - release.yml
  # benchmark-action/gh-release require tokens in with: block (not env-mappable)
  secrets-outside-env:
    ignore:
      - allocs.yml
      - bench.yml
      - bloat.yml
      - conformance.yml
      - coverage.yml
      - release.yml
