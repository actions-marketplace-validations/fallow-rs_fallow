name: Real-World Benchmarks

on:
  schedule:
    # Run daily at 07:00 UTC (after conformance at 06:00)
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    name: Real-world performance
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      deployments: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: bench-real-world

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: 9

      - name: Build fallow
        run: cargo build --release -p fallow-cli

      - name: Run real-world benchmarks
        id: bench
        run: |
          ./benchmarks/bench-ci.sh \
            --fallow-bin ./target/release/fallow \
            --clone-dir /tmp/fallow-bench-ci \
            --runs 3 \
            > bench-real-world.json \
            2>bench-real-world-stderr.txt
        continue-on-error: true

      - name: Store benchmark result
        if: always() && steps.bench.outcome != 'skipped'
        uses: benchmark-action/github-action-benchmark@a7bc2366eda11037936ea57d811a43b3418d3073 # v1
        continue-on-error: true
        with:
          name: Fallow Real-World Benchmarks
          tool: 'customSmallerIsBetter'
          output-file-path: bench-real-world.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          comment-on-alert: true
          alert-threshold: '120%'
          fail-on-alert: false
          save-data-file: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench-real-world

      - name: Post step summary
        if: always()
        run: |
          if [[ ! -f bench-real-world.json ]] || ! python3 -c "import json; json.load(open('bench-real-world.json'))" 2>/dev/null; then
            echo "## Real-World Benchmarks" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Benchmark suite did not produce a valid report. Check the logs." >> "$GITHUB_STEP_SUMMARY"
            if [[ -f bench-real-world-stderr.txt ]]; then
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              tail -30 bench-real-world-stderr.txt >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
            fi
            exit 0
          fi

          echo "## Real-World Benchmarks" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          python3 -c "
          import json
          with open('bench-real-world.json') as f:
              data = json.load(f)
          projects = {}
          for entry in data:
              name = entry['name']
              if name.endswith(' (cold)'):
                  proj = name.removesuffix(' (cold)')
                  projects.setdefault(proj, {})['cold'] = entry['value']
              elif name.endswith(' (warm)'):
                  proj = name.removesuffix(' (warm)')
                  projects.setdefault(proj, {})['warm'] = entry['value']
              elif name.endswith(' RSS'):
                  proj = name.removesuffix(' RSS')
                  projects.setdefault(proj, {})['rss'] = entry['value']
          print('| Project | Cold | Warm | Cache speedup | Peak RSS |')
          print('|---------|------|------|---------------|----------|')
          for proj in sorted(projects.keys()):
              d = projects[proj]
              cold = d.get('cold', 0)
              warm = d.get('warm', 0)
              rss = d.get('rss', 0)
              cold_str = f'{cold}ms' if cold < 1000 else f'{cold/1000:.2f}s'
              warm_str = f'{warm}ms' if warm < 1000 else f'{warm/1000:.2f}s'
              speedup = f'{cold/warm:.1f}x' if warm > 0 else '-'
              mb = rss / 1024 / 1024
              rss_str = f'{mb:.1f} MB' if mb < 1024 else f'{mb/1024:.2f} GB'
              print(f'| {proj} | {cold_str} | {warm_str} | {speedup} | {rss_str} |')
          " >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: bench-real-world-report
          path: |
            bench-real-world.json
            bench-real-world-stderr.txt
          retention-days: 30
